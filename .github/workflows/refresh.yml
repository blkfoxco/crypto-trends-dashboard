name: Weekly Refresh

on:
  schedule:
    - cron: '0 18 * * 0'  # Monday 01:00 GMT+7
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write          # needed for git commit & push

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Regenerate dashboard
        run: python trends_html.py

      - name: Copy to index.html
        run: cp crypto_trends_dashboard.html index.html

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html crypto_trends_dashboard.html
          git diff --cached --quiet || git commit -m "chore: weekly data refresh $(date -u '+%Y-%m-%d')"
          git push
